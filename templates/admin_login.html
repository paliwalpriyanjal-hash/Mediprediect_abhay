{% extends "base.html" %}
{% block title %}Admin Login — MediPredict{% endblock %}

{% block content %}
<section class="auth-section">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-6 col-lg-5">
                <div class="auth-card" style="border-top: 4px solid var(--bs-danger);">
                    <div class="auth-header text-center mb-4">
                        <div class="auth-icon mb-3 text-danger bg-danger-subtle">
                            <i class="bi bi-shield-lock"></i>
                        </div>
                        <h2 class="fw-bold">Admin Login</h2>
                        <p class="text-muted">Sign in with administrative credentials</p>
                    </div>

                    <form method="POST" action="{{ url_for('admin_login') }}" id="loginForm" novalidate>
                        <div class="mb-3">
                            <label for="email" class="form-label fw-medium">Admin Email</label>
                            <div class="input-group">
                                <span class="input-group-text"><i class="bi bi-envelope"></i></span>
                                <input type="email" class="form-control" id="email" name="email"
                                    placeholder="admin@example.com" required autocomplete="email" />
                            </div>
                        </div>

                        <div class="mb-4">
                            <label for="password" class="form-label fw-medium">Password</label>
                            <div class="input-group">
                                <span class="input-group-text"><i class="bi bi-key"></i></span>
                                <input type="password" class="form-control" id="password" name="password"
                                    placeholder="Admin password" required autocomplete="current-password" />
                                <button class="btn btn-outline-secondary" type="button" id="togglePwd">
                                    <i class="bi bi-eye" id="eyeIcon"></i>
                                </button>
                            </div>
                        </div>

                        <button type="submit" class="btn btn-danger w-100 btn-lg fw-semibold">
                            <i class="bi bi-box-arrow-in-right me-2"></i>Access Dashboard
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</section>
{% endblock %}

{% block extra_scripts %}
<script>
    document.getElementById('togglePwd').addEventListener('click', function () {
        const pwd = document.getElementById('password');
        const icon = document.getElementById('eyeIcon');
        if (pwd.type === 'password') {
            pwd.type = 'text';
            icon.className = 'bi bi-eye-slash';
        } else {
            pwd.type = 'password';
            icon.className = 'bi bi-eye';
        }
    });
</script>
{% endblock %}
